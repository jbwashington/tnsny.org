{{ define "main" }}
<!-- Page Header -->
<div class="bg-primary-50 border-b border-primary-100">
  <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
    <h1 class="font-heading text-3xl md:text-4xl font-bold text-primary-800">{{ .Title }}</h1>
    {{ with .Description }}
    <p class="mt-3 text-lg text-gray-600">{{ . }}</p>
    {{ end }}
  </div>
</div>

<!-- Content -->
<div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
  <article class="prose prose-lg max-w-none prose-headings:font-heading prose-headings:text-primary-800 prose-a:text-primary-700 prose-a:underline hover:prose-a:text-accent">
    {{ .Content }}
  </article>
</div>
{{ end }}
