{{ define "main" }}
<!-- Page Header -->
<section class="relative overflow-hidden" style="background: linear-gradient(165deg, #1a4a4a 0%, #1d5454 40%, #265e52 100%);">
  <div class="absolute inset-0 pointer-events-none" aria-hidden="true">
    <div style="border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%; background: #e8664a; opacity: 0.07; position: absolute; top: -40px; right: -40px; width: 200px; height: 200px;"></div>
  </div>
  <div class="relative max-w-4xl mx-auto px-5 sm:px-8 lg:px-12 py-14 md:py-20">
    <h1 class="text-4xl md:text-5xl lg:text-6xl font-black leading-[0.95]" style="font-family: 'Fraunces', serif; color: #faf3e8;">{{ .Title }}</h1>
    {{ with .Description }}
    <p class="mt-4 text-lg md:text-xl leading-relaxed max-w-2xl" style="font-family: 'Outfit', sans-serif; color: rgba(250, 243, 232, 0.7);">{{ . }}</p>
    {{ end }}
  </div>
  <div class="absolute bottom-0 left-0 right-0">
    <svg viewBox="0 0 1440 40" fill="none" preserveAspectRatio="none" style="width: 100%; height: 25px; display: block;">
      <path d="M0,20 C480,40 960,0 1440,20 L1440,40 L0,40 Z" fill="#faf3e8"/>
    </svg>
  </div>
</section>

<!-- Content -->
<div class="max-w-4xl mx-auto px-5 sm:px-8 lg:px-12 py-12 md:py-16">
  <article class="prose prose-lg max-w-none
    prose-headings:font-black prose-headings:leading-tight
    prose-h1:text-4xl prose-h1:md:text-5xl
    prose-h2:text-2xl prose-h2:md:text-3xl prose-h2:mt-12 prose-h2:mb-4
    prose-h3:text-xl prose-h3:md:text-2xl prose-h3:mt-8 prose-h3:mb-3
    prose-h4:text-lg prose-h4:md:text-xl
    prose-p:text-base prose-p:md:text-lg prose-p:leading-relaxed
    prose-li:text-base prose-li:md:text-lg
    prose-a:underline prose-a:decoration-2 prose-a:underline-offset-2 hover:prose-a:opacity-70
    prose-strong:font-bold
    prose-blockquote:border-l-4 prose-blockquote:pl-6 prose-blockquote:italic prose-blockquote:text-lg"
    style="font-family: 'Outfit', sans-serif; --tw-prose-headings: #1a4a4a; --tw-prose-body: #3d5a4a; --tw-prose-links: #e8664a; --tw-prose-bold: #1a4a4a; --tw-prose-quotes: #4a6a5a; --tw-prose-quote-borders: #e8664a; --tw-prose-counters: #8aab7f; --tw-prose-bullets: #8aab7f; --tw-prose-hr: #d4dce4; font-family: 'Outfit', sans-serif;">
    <style>
      .prose h1, .prose h2, .prose h3, .prose h4, .prose h5, .prose h6 { font-family: 'Fraunces', Georgia, serif; }
    </style>
    {{ .Content }}
  </article>
</div>
{{ end }}
