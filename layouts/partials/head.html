<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>
<meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
<link rel="canonical" href="{{ .Permalink }}">

<!-- Tailwind CSS via CDN -->
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          primary: {
            50: '#f0f7f7',
            100: '#d4e8e8',
            200: '#a8d0d0',
            300: '#7cb8b8',
            400: '#509f9f',
            500: '#2d7a7a',
            600: '#236363',
            700: '#1d5454',
            800: '#1a4a4a',
            900: '#123636',
          },
          accent: {
            light: '#f08a6e',
            DEFAULT: '#e8664a',
            dark: '#c44a32',
          },
          sage: {
            light: '#a8c4a0',
            DEFAULT: '#8aab7f',
            dark: '#6d8d66',
          },
          sun: {
            light: '#f5d76e',
            DEFAULT: '#f0c541',
            dark: '#c5a030',
          },
          cream: '#faf3e8',
        },
        fontFamily: {
          heading: ['Fraunces', 'Georgia', 'serif'],
          body: ['Outfit', 'system-ui', 'sans-serif'],
        },
      },
    },
  }
</script>

<!-- Google Fonts — Fraunces (expressive display) + Outfit (clean geometric) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,600;0,9..144,700;0,9..144,900;1,9..144,400;1,9..144,600&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
  body {
    font-family: 'Outfit', system-ui, sans-serif;
    background: #faf3e8;
    color: #2d2d2d;
  }
  h1, h2, h3, h4, h5, h6 {
    font-family: 'Fraunces', Georgia, serif;
  }
  ::selection {
    background: rgba(232, 102, 74, 0.25);
    color: #1a4a4a;
  }
</style>

<!-- Decap CMS Identity Widget (for git-gateway auth) -->
<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
